    <script>
        fetch('/lottieflow-404-12-1-000000-easey.json')
            .then(response => {

                }
                return response.json();
            })
            .then(data => {
                // ใช้ข้อมูลจาก JSON เพื่อเปลี่ยนพื้นหลัง
                if (data.backgroundImage) {
                    document.body.style.backgroundImage = `url(${data.backgroundImage})`;

    <script>
        // =====================================================================
        //  CERTIFICATE VIEWER
        // =====================================================================

        // ── STATE ──────────────────────────────────────────────────────────────
        const STATE = {
            allCertificates: [],
            certStore: {}   // certId → cert object (ใช้กับ modal)
        };

        // ── UTILITIES ──────────────────────────────────────────────────────────

        function parseCertDate(d) {
            if (!d) return new Date(0);
            const m = String(d).match(/Date\((\d+),(\d+),(\d+)\)/);
            if (m) return new Date(+m[1], +m[2], +m[3]);
            if (String(d).includes('-')) return new Date(d);
            return new Date(0);
        }

        function formatDateThai(d) {
            if (!d) return '';
            const MONTHS = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            const date = parseCertDate(d);
            if (!date.getTime()) return d;
            return `${date.getDate()} ${MONTHS[date.getMonth()]} ${date.getFullYear() + 543}`;
        }

        function escapeHtml(t) {
            const el = document.createElement('div');
            el.textContent = t;
            return el.innerHTML;
        }

        function highlightText(text, q) {
            if (!q || !text) return text || '';
            const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
        }

        function typeBadgeHtml(type) {
            if (!type) return '';
            const color = (MYCERT.TYPE_COLORS || {})[type] || 'bg-gray-100 text-gray-600 border-gray-200';
            const t = MYCERT.TYPES.find(t => t.label === type);
            const icon = t ? t.icon : 'fa-tag';
            return `<span class="inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full border ${color}">
                    <i class="fas ${icon} text-[10px]"></i>${escapeHtml(type)}
                </span>`;
        }

        // ── STATS BAR ──────────────────────────────────────────────────────────

        function renderStatsBar(certs) {
            const stats = [
                { icon: 'fa-certificate', value: certs.length, label: 'ใบประกาศทั้งหมด', },
                { icon: 'fa-tag', value: new Set(certs.map(c => c.type).filter(Boolean)).size, label: 'ประเภท', },
                { icon: 'fa-building', value: new Set(certs.map(c => c.issuer).filter(Boolean)).size, label: 'หน่วยงาน', },
                { icon: 'fa-shield-alt', value: certs.filter(c => c.verifyUrl).length, label: 'มี Verify URL', },
            ];
            $('#stats-bar').html(stats.map((s, i) => `
            <div data-aos="fade-up" data-aos-delay="${i * 80}"
                class="bg-gray-50 border rounded-xl shadow-inner p-2 sm:p-4 flex items-center gap-3">
                <div class="size-10 flex-shrink-0 flex items-center justify-center bg-[color:var(--white-smoker)] rounded-full shadow">
                    <i class="fas ${s.icon} text-blue-500"></i>
                </div>
                <div>
                    <p class="text-2xl font-bold text-gray-800 leading-none">${s.value}</p>
                    <p class="text-xs text-gray-400 mt-0.5">${s.label}</p>
                </div>
            </div>`).join(''));
        }
        // 3b. HEATMAP

        function renderHeatmap(certificates) {
            // ── สร้าง map: "YYYY-MM-DD" → count ──
            const dateMap = {};
            certificates.forEach(c => {
                const d = parseCertDate(c.date);
                if (d.getTime() === 0) return;
                const key = d.toISOString().split('T')[0];
                dateMap[key] = (dateMap[key] || 0) + 1;
            });

            if (Object.keys(dateMap).length === 0) {
                $('#heatmap-grid').html(`
                    <p class="text-xs text-gray-400 py-4 w-full text-center">
                        <i class="fas fa-calendar-times mr-1"></i>ยังไม่มีข้อมูลวันที่
                    </p>`);
                return;
            }

            // ── กำหนดช่วงเวลา: 52 สัปดาห์ย้อนหลัง ──
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const startDay = new Date(today);
            startDay.setDate(startDay.getDate() - 364); // ~52 weeks
            // เลื่อนไปวันอาทิตย์ก่อนหน้า
            startDay.setDate(startDay.getDate() - startDay.getDay());

            const DAYS_TH = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
            const MONTHS_TH = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
                'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

            // color scale สีฟ้า
            const COLORS = ['#e3f2fd', '#90caf9', '#42a5f5', '#1976d2', '#0d47a1'];
            const maxCount = Math.max(...Object.values(dateMap), 1);
            function getColor(count) {
                if (!count) return null;
                const idx = Math.min(Math.ceil((count / maxCount) * COLORS.length) - 1, COLORS.length - 1);
                return COLORS[idx];
            }

            // ── สร้าง grid columns (แต่ละ column = 1 สัปดาห์) ──
            const weeks = [];
            const cur = new Date(startDay);
            let prevMonth = -1;
            const monthLabels = []; // { weekIndex, label }

            while (cur <= today) {
                const week = [];
                for (let dow = 0; dow < 7; dow++) {
                    const d = new Date(cur);
                    d.setDate(d.getDate() + dow);
                    week.push(new Date(d));
                }
                // track month label
                const firstVisible = week.find(d => d <= today);
                if (firstVisible && firstVisible.getMonth() !== prevMonth) {
                    monthLabels.push({ weekIndex: weeks.length, label: MONTHS_TH[firstVisible.getMonth()] });
                    prevMonth = firstVisible.getMonth();
                }
                weeks.push(week);
                cur.setDate(cur.getDate() + 7);
            }

            // ── HTML ──
            const CELL = 12; // px cell size
            const GAP = 2;
            const totalW = weeks.length * (CELL + GAP);

            let svg = `<svg xmlns="http://www.w3.org/2000/svg"
                width="${totalW}" height="${7 * (CELL + GAP) + 20}"
                style="display:block;font-family:inherit;">`;

            // Month labels
            monthLabels.forEach(({ weekIndex, label }) => {
                const x = weekIndex * (CELL + GAP);
                svg += `<text x="${x}" y="10" font-size="9" fill="#9ca3af">${label}</text>`;
            });

            // Day label (Mon, Wed, Fri only)
            [1, 3, 5].forEach(dow => {
                const y = 20 + dow * (CELL + GAP) + CELL * 0.75;
                svg += `<text x="-2" y="${y}" font-size="8" fill="#9ca3af" text-anchor="end">${DAYS_TH[dow]}</text>`;
            });

            // Cells
            weeks.forEach((week, wi) => {
                week.forEach((day, dow) => {
                    if (day > today) return;
                    const key = day.toISOString().split('T')[0];
                    const count = dateMap[key] || 0;
                    const color = getColor(count) || '#e3f2fd';
                    const x = wi * (CELL + GAP);
                    const y = 20 + dow * (CELL + GAP);
                    const dateStr = `${day.getDate()} ${MONTHS_TH[day.getMonth()]} ${day.getFullYear() + 543}`;
                    const tip = count
                        ? `${count} ใบ — ${dateStr}`
                        : `ไม่มี — ${dateStr}`;
                    const opacity = count ? 1 : 0.35;

                    svg += `<rect x="${x}" y="${y}" width="${CELL}" height="${CELL}"
                        rx="2" fill="${color}" opacity="${opacity}"
                        data-date="${key}" data-count="${count}" data-tip="${tip}"
                        class="heatmap-cell" style="cursor:${count ? 'pointer' : 'default'}"/>`;
                });
            });

            svg += `</svg>`;

            // wrap ใน container ที่ scroll ได้ พร้อม day-label margin
            $('#heatmap-grid').html(`
                <div style="overflow-x:auto;padding-bottom:4px;">
                    <div style="padding-left:20px;display:inline-block;">
                        ${svg}
                    </div>
                </div>`);

            // ── Tooltip hover ──
            $(document).on('mouseenter', '.heatmap-cell', function () {
                const tip = $(this).data('tip');
                const count = parseInt($(this).data('count'));
                const icon = count ? '<i class="fas fa-certificate mr-1 text-[color:var(--primary-color)]"></i>' : '<i class="far fa-calendar mr-1 text-gray-300"></i>';
                $('#heatmap-hover').html(`${icon}${tip}`);
            });
            $(document).on('mouseleave', '.heatmap-cell', function () {
                $('#heatmap-hover').text('');
            });

            // click → filter ปีนั้น
            $(document).on('click', '.heatmap-cell', function () {
                const count = parseInt($(this).data('count'));
                if (!count) return;
                const date = $(this).data('date');
                const year = new Date(date).getFullYear();
                $('#year-filter').val(year).trigger('change');
                $('html,body').animate({ scrollTop: $('#certificates-grid').offset().top - 80 }, 400);
            });

            // update title
            const total = Object.values(dateMap).reduce((a, b) => a + b, 0);
            $('#heatmap-title').text(`${total} ใบประกาศ ใน 12 เดือนที่ผ่านมา`);
        }
        
        // ── MODAL ──────────────────────────────────────────────────────────────

        function createImageModal() {
            $('body').append(`
            <div id="image-modal" class="hidden fixed inset-0 flex flex-col items-center justify-evenly sm:justify-center bg-black/70 backdrop-blur-sm p-2 z-40">
                <div onclick="event.stopPropagation()" class="slide-up relative max-h-[85%] max-w-7xl w-full grid grid-cols-1 md:grid-cols-2 bg-[color:var(--white-smoker)] rounded-2xl shadow-2xl">
                    <span class="stamp-icon absolute -top-10 left-[25%] text-center z-20">
                        <i class="fa-solid fa-certificate absolute inset-0 flex items-center justify-center text-8xl text-[color:var(--primary-color)] drop-shadow-lg"></i>
                        <span id="modal-cert-id" class="relative text-white text-2xl font-medium"></span>
                    </span>
                    <div class="relative flex items-center justify-center border-b md:border-b-0 md:border-r bg-gray-100 overflow-hidden min-h-48">
                        <img id="modal-image" src="" alt=""
                            class="w-full object-contain max-h-[50vh] md:max-h-full"
                            onerror="this.src='${MYCERT.NO_IMAGE_URL}'" draggable="false">
                    </div>
                    <div id="modal-details" class="hidden flex flex-col gap-3 bg-white p-5 overflow-y-auto max-h-[85vh]"></div>
                </div>
                <span class="brop-icon sm:absolute bottom-6 text-xs sm:text-sm bg-white/90 border rounded-full px-3 py-1.5 shadow select-none">
                    <i class="fas fa-times-circle mr-1 text-gray-400"></i>แตะพื้นที่ว่างเพื่อปิด
                </span>
            </div>`);
            $('#image-modal').on('click', closeImageModal);
        }

        function viewImageWithData(certId) {
            const cert = STATE.certStore[certId];
            if (!cert) return;
            const imageUrl = cert.image && cert.image !== '-' ? cert.image : MYCERT.NO_IMAGE_URL;

            $('#modal-image').attr({ src: imageUrl, alt: cert.name });

            const q = $('#search-input').val().toLowerCase() || '';
            $('#modal-details').html(`
            ${cert.type ? `<div>${typeBadgeHtml(cert.type)}</div>` : ''}
            <h3 class="text-lg sm:text-xl font-bold leading-snug text-gray-800">
                ${highlightText(escapeHtml(cert.name), q)}
            </h3>
            <div class="space-y-1.5 text-xs sm:text-sm text-gray-600">
                ${cert.issuer ? `<p class="flex items-center gap-2"><i class="fas fa-building w-4 text-[color:var(--primary-color)]"></i><span>${escapeHtml(cert.issuer)}</span></p>` : ''}
                <p class="flex items-center gap-2"><i class="fas fa-calendar-alt w-4 text-[color:var(--primary-color)]"></i><span>${formatDateThai(cert.date) || '—'}</span></p>
                ${cert.id ? `<p class="flex items-center gap-2"><i class="fas fa-hashtag w-4 text-[color:var(--primary-color)]"></i><span>${escapeHtml(String(cert.id))}</span></p>` : ''}
            </div>
            ${cert.description ? `
            <div class="flex-1 bg-gray-50 border rounded-xl shadow-inner p-3 overflow-y-auto text-xs sm:text-sm text-gray-600 leading-relaxed">
                ${highlightText(escapeHtml(cert.description), q)}
            </div>` : ''}
            ${cert.verifyUrl ? `
            <a href="${escapeHtml(cert.verifyUrl)}" target="_blank" rel="noopener noreferrer"
                class="flex items-center justify-center gap-2 text-xs sm:text-sm font-semibold text-green-600 bg-green-50 border border-green-200 rounded-xl hover:bg-green-100 px-4 py-2.5 transition shadow">
                <i class="fas fa-shield-alt"></i>ตรวจสอบใบประกาศ<i class="fas fa-external-link-alt text-xs opacity-70"></i>
            </a>` : ''}
        `).removeClass('hidden');

            $('#modal-cert-id').text(cert.id || '');
            $('#image-modal').removeClass('hidden').hide().fadeIn(300);
            history.pushState({ imageModal: true }, '');
            AOS.refresh();
        }

        function closeImageModal() {
            if (!$('#image-modal').hasClass('hidden'))
                $('#image-modal').fadeOut(300, function () { $(this).addClass('hidden'); });
        }

        // ── RENDER CARDS ───────────────────────────────────────────────────────

        function renderCertificates(certs = STATE.allCertificates, searchTerm = '') {
            const $grid = $('#certificates-grid');
            if (!certs.length) {
                $grid.html(`
                <div data-aos="fade-up" class="col-span-full text-center space-y-3 py-40">
                    <i class="fas fa-certificate fa-beat text-7xl text-[color:var(--primary-color)] mb-4 opacity-40"></i>
                    <p class="text-lg sm:text-xl font-semibold">ไม่พบใบประกาศนียบัตร</p>
                    <p class="text-sm text-gray-400">ลองค้นหาด้วยคำอื่นหรือเปลี่ยนตัวกรอง</p>
                </div>`);
                return;
            }

            $grid.html(certs.map((cert, i) => {
                const certId = `cert_${i}`;
                const imageUrl = cert.image && cert.image !== '-' ? cert.image : MYCERT.NO_IMAGE_URL;
                const noImage = imageUrl === MYCERT.NO_IMAGE_URL;
                STATE.certStore[certId] = cert;

                const imgSection = noImage
                    ? `<div class="relative w-full overflow-hidden bg-gray-100" style="aspect-ratio:16/11.2">
                    <img src="${imageUrl}" class="w-full min-h-56 object-cover opacity-30" loading="lazy" draggable="false">
                    <div class="absolute inset-0 flex flex-col items-center justify-center gap-1">
                        <i class="fas fa-image text-3xl text-gray-300"></i>
                        <span class="text-xs text-gray-400">ไม่มีรูปภาพ</span>
                    </div>
                   </div>`
                    : `<button onclick="viewImageWithData('${certId}')"
                    class="relative w-full min-h-56 overflow-hidden group/img bg-gray-50" style="aspect-ratio:16/11.2">
                    <img src="${imageUrl}" alt="${escapeHtml(cert.name)}"
                        class="w-full h- object-contain transition-transform duration-500 group-hover/img:scale-90"
                        loading="lazy" onerror="this.src='${MYCERT.NO_IMAGE_URL}'" draggable="false">
                    <div class="absolute inset-0 flex items-center justify-center bg-black/0 group-hover/img:bg-black/40 transition-all duration-300">
                        <div class="flex items-center gap-1.5 text-xs font-semibold text-white bg-black/50 backdrop-blur-sm rounded-full px-3 py-1.5 opacity-0 group-hover/img:opacity-100 transition-all duration-300 translate-y-2 group-hover/img:translate-y-0">
                            <i class="fas fa-expand"></i>ดูภาพเต็ม
                        </div>
                    </div>
                   </button>`;

                return `
            <div data-aos="zoom-in-up" data-aos-delay="${i * 40}"
                class="relative bg-white border rounded-2xl shadow-sm overflow-hidden flex flex-col transition-shadow duration-300">
                ${imgSection}
                <div class="flex flex-col gap-1.5 p-3 flex-1">
                    ${cert.type ? `<div class="mb-0.5">${typeBadgeHtml(cert.type)}</div>` : ''}
                    <h3 title="${escapeHtml(cert.name)}" class="text-sm sm:text-base font-bold text-gray-800 leading-snug line-clamp-2">
                        ${highlightText(escapeHtml(cert.name), searchTerm)}
                    </h3>
                    ${cert.issuer ? `<p class="flex items-center gap-1.5 text-xs text-gray-500"><i class="fas fa-building text-[color:var(--primary-color)] w-3 flex-shrink-0"></i><span class="line-clamp-1">${escapeHtml(cert.issuer)}</span></p>` : ''}
                    <p class="flex items-center gap-1.5 text-xs text-gray-400"><i class="fas fa-calendar-alt text-[color:var(--primary-color)] w-3 flex-shrink-0"></i><span>${formatDateThai(cert.date) || '—'}</span></p>
                    <div class="flex-1"></div>
                    <div class="flex items-center justify-between gap-2 pt-2 mt-1 border-t border-gray-100">
                        ${cert.id ? `<span class="inline-flex items-center gap-1 text-xs text-blue-500 bg-blue-50 border border-blue-100 rounded-full px-2 py-0.5"><i class="fas fa-hashtag text-[9px]"></i>${escapeHtml(String(cert.id))}</span>` : '<span></span>'}
                        <div class="flex items-center gap-1">
                            ${cert.verifyUrl ? `<a href="${escapeHtml(cert.verifyUrl)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()"
                                class="inline-flex items-center gap-1 text-xs font-semibold text-green-600 bg-green-50 border border-green-200 rounded-full px-2 py-0.5 hover:bg-green-100 transition"
                                title="ตรวจสอบ"><i class="fas fa-shield-alt text-[9px]"></i>Verify</a>` : ''}
                        </div>
                    </div>
                </div>
            </div>`;
            }).join(''));
        }

        // ── FILTER & SEARCH ────────────────────────────────────────────────────

        function filterCertificates() {
            const q = $('#search-input').val().toLowerCase();
            const year = $('#year-filter').val();
            const issuer = $('#issuer-filter').val();
            const type = $('#type-filter').val();

            let filtered = STATE.allCertificates.filter(c => {
                const matchQ = !q || c.name.toLowerCase().includes(q) || (c.description || '').toLowerCase().includes(q) || (c.issuer || '').toLowerCase().includes(q);
                const certYear = parseCertDate(c.date).getFullYear();
                const matchYear = !year || certYear === parseInt(year);
                const matchIssuer = !issuer || c.issuer === issuer;
                const matchType = !type || c.type === type;
                return matchQ && matchYear && matchIssuer && matchType;
            });

            filtered.sort((a, b) => {
                const diff = parseCertDate(b.date) - parseCertDate(a.date);
                return diff !== 0 ? diff : (b.id ?? 0) - (a.id ?? 0);
            });

            renderCertificates(filtered, q);

            const total = STATE.allCertificates.length;
            const text = filtered.length === total ? `แสดงทั้งหมด ${total} ใบ` : `แสดง ${filtered.length} จาก ${total} ใบ`;
            $('#results-count').html(`<span class="flex items-center gap-2 text-gray-600 font-medium"><i class="fas fa-certificate text-[color:var(--primary-color)]"></i><p class="line-clamp-1">${text}</p></span>`);
            AOS.refresh();
        }

        function populateFilters(certs) {
            const years = [...new Set(certs.map(c => { const d = parseCertDate(c.date); return isNaN(d.getFullYear()) ? null : d.getFullYear(); }).filter(Boolean))].sort((a, b) => b - a);
            years.forEach(y => $('#year-filter').append(`<option value="${y}">${y + 543} (${y})</option>`));
            [...new Set(certs.map(c => c.issuer).filter(Boolean))].sort().forEach(i => $('#issuer-filter').append(`<option value="${escapeHtml(i)}">${escapeHtml(i)}</option>`));
            [...new Set(certs.map(c => c.type).filter(Boolean))].sort().forEach(t => $('#type-filter').append(`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`));
        }

        function bindEventListeners() {
            $('#search-input').on('input', filterCertificates);
            $('#year-filter, #issuer-filter, #type-filter').on('change', filterCertificates);
            $('#clear-filters').on('click', function () {
                $('#search-input, #year-filter, #issuer-filter, #type-filter').val('');
                filterCertificates();
            });
            $('.grid-btn').on('click', function () {
                const cols = $(this).data('cols');
                $('#certificates-grid').removeClass('grid-cols-1 grid-cols-2 grid-cols-3 sm:grid-cols-2 md:grid-cols-3').addClass(`grid-cols-${cols}`);
                filterCertificates();
            });
            $(document).keydown(e => { if (e.key === 'Escape') closeImageModal(); });
            window.addEventListener('popstate', () => closeImageModal());
        }

        function initCertificates(certs) {
            STATE.allCertificates = certs;
            renderStatsBar(certs);
            populateFilters(certs);
            bindEventListeners();
            filterCertificates();
        }

        // ── CACHE ──────────────────────────────────────────────────────────────

        function saveCache(certs) {
            try { localStorage.setItem(MYCERT.CACHE_KEY, JSON.stringify({ ts: Date.now(), data: certs })); } catch (e) { }
        }
        function loadCache() {
            try {
                const raw = localStorage.getItem(MYCERT.CACHE_KEY);
                if (!raw) return null;
                const { ts, data } = JSON.parse(raw);
                return (Date.now() - ts) > MYCERT.CACHE_TTL ? null : data;
            } catch (e) { return null; }
        }
        function clearCache() { localStorage.removeItem(MYCERT.CACHE_KEY); }

        // ── FETCH ──────────────────────────────────────────────────────────────

        function showCacheIndicator(state) {
            const map = {
                loading: { icon: 'fa-circle-notch fa-spin', cls: 'text-gray-400', text: 'กำลังโหลด...' },
                cache: { icon: 'fa-bolt', cls: 'text-amber-500', text: 'โหลดจาก cache' },
                fresh: { icon: 'fa-cloud-download-alt', cls: 'text-green-500', text: 'โหลดจาก API' },
                error: { icon: 'fa-exclamation-circle', cls: 'text-red-400', text: 'โหลดไม่สำเร็จ' },
            };
            const s = map[state] || map.loading;
            $('#results-count').html(`<span class="flex items-center gap-2 font-medium ${s.cls}"><i class="fas ${s.icon}"></i><p class="line-clamp-1 text-xs">${s.text}</p></span>`);
        }

        function parseCertificatesFromREST(json) {
            return json.data.filter(c => c.name).map(c => ({
                id: c.id ?? '', name: c.name ?? '', issuer: c.issuer ?? '', type: c.type ?? '',
                date: c.date ?? '', description: c.description ?? '', image: c.image ?? '', verifyUrl: c.verifyUrl ?? ''
            }));
        }

        function parseCertificatesFromGViz(text) {
            const gviz = JSON.parse(text.substr(47).slice(0, -2));
            return gviz.table.rows.map((row, i) => ({
                id: row.c[0]?.v ?? i + 1, name: row.c[1]?.v ?? '', issuer: row.c[2]?.v ?? '', type: row.c[3]?.v ?? '',
                date: row.c[4]?.v ?? '', description: row.c[5]?.v ?? '', image: row.c[6]?.v ?? '', verifyUrl: row.c[7]?.v ?? ''
            })).filter(c => c.name);
        }

        function fetchCertificatesData(forceRefresh = false) {
            if (!forceRefresh) {
                const cached = loadCache();
                if (cached) { showCacheIndicator('cache'); $(document).ready(() => initCertificates(cached)); return; }
            }
            showCacheIndicator('loading');
            fetch(MYCERT.API_URL)
                .then(r => r.text())
                .then(text => {
                    let certs;
                    const json = JSON.parse(text);
                    if (json.success === true && Array.isArray(json.data)) certs = parseCertificatesFromREST(json);
                    else if (text.includes('google.visualization')) certs = parseCertificatesFromGViz(text);
                    else throw new Error('ไม่รู้จัก response format');
                    saveCache(certs);
                    showCacheIndicator('fresh');
                    $(document).ready(() => initCertificates(certs));
                })
                .catch(err => {
                    console.error('[Fetch]', err);
                    showCacheIndicator('error');
                    if (typeof showNotification === 'function') showNotification('โหลดข้อมูลไม่สำเร็จ 😐', 'error');
                    $('#certificates-grid').html(`
                    <div class="col-span-full text-center text-red-500 space-y-3 py-40">
                        <i class="fas fa-exclamation-triangle fa-beat text-7xl pb-4 opacity-60"></i>
                        <p class="text-lg sm:text-xl font-semibold">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>
                        <p class="text-sm text-gray-400">โปรดลองใหม่อีกครั้ง</p>
                        <button onclick="fetchCertificatesData(true)" class="mt-2 text-sm text-white bg-[color:var(--primary-color)] px-4 py-2 rounded-xl shadow">
                            <i class="fas fa-redo mr-1"></i>รีโหลด
                        </button>
                    </div>`);
                });
        }

        // ── INIT ───────────────────────────────────────────────────────────────
        $(document).ready(function () {
            AOS.init({ once: true, offset: 50 });
            createImageModal();
            fetchCertificatesData();
        });

        // expose globals
        window.viewImageWithData = viewImageWithData;
        window.closeImageModal = closeImageModal;
        window.fetchCertificatesData = fetchCertificatesData;
        window.clearCache = clearCache;
    </script>

    <script src="script.js"></script>
    <script src="https://asia-lb.firebaseapp.com/script/index.js"></script>
</body>

</html>

    <script>
        // =====================================================================
        // CERTIFICATE VIEWER - Main Script
        // =====================================================================

        // 1. CONFIG & STATE
        const CONFIG = {
            noImageUrl: "https://project-test-submission.netlify.app/images/img/noitems.svg"
        };
        const STATE = {
            allCertificates: [],
            certificateDataStore: {}
        };
        const API_URL   = `https://script.google.com/macros/s/AKfycbxH8A8bzk94276owKz7JoGgBXqdp0ZtQPhuYanVRUtqBHP5JuLP__bVdjOzHnGxgTUWbg/exec`;
        const CACHE_KEY = 'mycert_cache';
        const CACHE_TTL = 5 * 60 * 1000; // 5 นาที

        // ── Type → color badge map ──
        const TYPE_COLORS = {
            'เวิร์กชอป': 'bg-purple-100 text-purple-700 border-purple-200',
            'อบรม / สัมมนา': 'bg-blue-100 text-blue-700 border-blue-200',
            'หลักสูตรออนไลน์': 'bg-sky-100 text-sky-700 border-sky-200',
            'การแข่งขัน': 'bg-orange-100 text-orange-700 border-orange-200',
            'รางวัล': 'bg-yellow-100 text-yellow-700 border-yellow-200',
            'ทักษะเฉพาะทาง': 'bg-green-100 text-green-700 border-green-200',
            'ประกาศนียบัตร / วุฒิบัตร': 'bg-red-100 text-red-700 border-red-200',
        };
        const TYPE_ICONS = {
            'เวิร์กชอป': 'fa-tools',
            'อบรม / สัมมนา': 'fa-chalkboard-teacher',
            'หลักสูตรออนไลน์': 'fa-laptop',
            'การแข่งขัน': 'fa-trophy',
            'รางวัล': 'fa-medal',
            'ทักษะเฉพาะทาง': 'fa-star',
            'ประกาศนียบัตร / วุฒิบัตร': 'fa-scroll',
        };

        // 2. UTILITIES

        function parseCertDate(sheetDate) {
            if (!sheetDate) return new Date(0);
            const match = sheetDate.match(/Date\((\d+),(\d+),(\d+)\)/);
            if (match) return new Date(parseInt(match[1]), parseInt(match[2]), parseInt(match[3]));
            if (sheetDate.includes('-')) return new Date(sheetDate);
            return new Date(0);
        }

        function formatDateThai(sheetDate) {
            if (!sheetDate) return "";
            const MONTHS = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            const date = parseCertDate(sheetDate);
            if (date.getTime() === 0) return sheetDate;
            return `${date.getDate()} ${MONTHS[date.getMonth()]} ${date.getFullYear() + 543}`;
        }

        function highlightText(text, searchTerm) {
            if (!searchTerm || !text) return text || '';
            const escapedTerm = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(`(${escapedTerm})`, 'gi'), '<mark>$1</mark>');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function typeBadgeHtml(type) {
            if (!type) return '';
            const color = TYPE_COLORS[type] || 'bg-gray-100 text-gray-600 border-gray-200';
            const icon = TYPE_ICONS[type] || 'fa-tag';
            return `<span class="inline-flex items-center gap-1 text-xs font-semibold px-2 py-0.5 rounded-full border ${color}"><i class="fas ${icon} text-[10px]"></i>${escapeHtml(type)}</span>`;
        }

        // 3. STATS BAR

        function renderStatsBar(certificates) {
            const total = certificates.length;
            const types = new Set(certificates.map(c => c.type).filter(Boolean)).size;
            const issuers = new Set(certificates.map(c => c.issuer).filter(Boolean)).size;
            const verified = certificates.filter(c => c.verifyUrl).length;

            const stats = [
                { icon: 'fa-certificate', value: total, label: 'ใบประกาศทั้งหมด', color: 'text-blue-500', bg: 'bg-blue-50' },
                { icon: 'fa-tag', value: types, label: 'ประเภท', color: 'text-purple-500', bg: 'bg-purple-50' },
                { icon: 'fa-building', value: issuers, label: 'หน่วยงาน', color: 'text-green-500', bg: 'bg-green-50' },
                { icon: 'fa-shield-alt', value: verified, label: 'มี Verify URL', color: 'text-amber-500', bg: 'bg-amber-50' },
            ];

            $('#stats-bar').html(stats.map((s, i) => `
                <div data-aos="zoom-in-up" data-aos-delay="${i * 80}"
                    class="bg-white border rounded-xl shadow-sm p-4 flex items-center gap-3">
                    <div class="size-10 flex-shrink-0 flex items-center justify-center rounded-full ${s.bg}">
                        <i class="fas ${s.icon} ${s.color}"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-gray-800 leading-none">${s.value}</p>
                        <p class="text-xs text-gray-400 mt-0.5">${s.label}</p>
                    </div>
                </div>
            `).join(''));
        }

        // 4. MODAL

        function createImageModal() {
            $('body').append(`
            <div id="image-modal" class="hidden fixed inset-0 flex flex-col items-center justify-evenly sm:justify-center bg-black/70 backdrop-blur-sm p-4 z-40">
                <div onclick="event.stopPropagation()" class="slide-up relative max-h-[85%] max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 bg-[color:var(--white-smoker)] shadow-2xl">

                    <!-- stamp icon -->
                    <span class="stamp-icon absolute -top-10 left-[25%] text-center z-20">
                        <i class="fa-solid fa-certificate absolute inset-0 flex items-center justify-center text-8xl text-[color:var(--primary-color)] drop-shadow-lg"></i>
                        <span id="modal-cert-id" class="relative text-white text-2xl font-medium"></span>
                    </span>

                    <!-- Image -->
                    <div class="relative flex items-center justify-center border-b md:border-b-0 md:border-r bg-gray-100 overflow-hidden min-h-48">
                        <img id="modal-image" src="" alt=""
                            class="w-full object-contain max-h-[50vh] md:max-h-full"
                            onerror="this.src='${CONFIG.noImageUrl}'" draggable="false">
                    </div>

                    <!-- Details -->
                    <div id="modal-details" class="flex flex-col !gap-3 bg-white p-5 overflow-y-auto max-h-[85vh]"></div>
                </div>

                <!-- close hint -->
                <span class="brop-icon sm:absolute bottom-6 text-xs sm:text-sm bg-white/90 border rounded-full px-3 py-1.5 shadow select-none">
                    <i class="fas fa-times-circle mr-1 text-gray-400"></i>แตะพื้นที่ว่างเพื่อปิด
                </span>
            </div>`);

            $('#image-modal').on('click', closeImageModal);
        }

        function viewImage(imageSrc, altText = '', certData = null) {
            $('#modal-image').attr({ src: imageSrc, alt: altText });

            if (certData) {
                const q = $('#search-input').val().toLowerCase() || '';
                $('#modal-details').html(`
                    <!-- Type badge -->
                    ${certData.type ? `<div>${typeBadgeHtml(certData.type)}</div>` : ''}

                    <!-- Name -->
                    <h3 class="text-lg sm:text-xl font-bold leading-snug text-gray-800">
                        ${highlightText(escapeHtml(certData.name), q)}
                    </h3>

                    <!-- Meta -->
                    <div class="space-y-1.5 text-xs sm:text-sm text-gray-600">
                        ${certData.issuer ? `
                        <p class="flex items-center gap-2">
                            <i class="fas fa-building w-4 text-[color:var(--primary-color)]"></i>
                            <span>${escapeHtml(certData.issuer)}</span>
                        </p>` : ''}
                        <p class="flex items-center gap-2">
                            <i class="fas fa-calendar-alt w-4 text-[color:var(--primary-color)]"></i>
                            <span>${formatDateThai(certData.date) || '—'}</span>
                        </p>
                        ${certData.id ? `
                        <p class="flex items-center gap-2">
                            <i class="fas fa-hashtag w-4 text-[color:var(--primary-color)]"></i>
                            <span class="font-mono">${escapeHtml(String(certData.id))}</span>
                        </p>` : ''}
                    </div>

                    <!-- Description -->
                    ${certData.description ? `
                    <div class="flex-1 bg-gray-50 border rounded-xl shadow-inner p-3 overflow-y-auto text-xs sm:text-sm text-gray-600 leading-relaxed">
                        ${highlightText(escapeHtml(certData.description), q)}
                    </div>` : ''}

                    <!-- Verify URL -->
                    ${certData.verifyUrl ? `
                    <a href="${escapeHtml(certData.verifyUrl)}" target="_blank" rel="noopener noreferrer"
                        class="flex items-center justify-center gap-2 text-xs sm:text-sm font-semibold text-white bg-green-400 hover:bg-green-500 rounded-xl px-4 py-2.5 transition shadow">
                        <i class="fas fa-shield-alt"></i>
                        ตรวจสอบใบประกาศ
                        <i class="fas fa-external-link-alt text-xs opacity-70"></i>
                    </a>` : ''}
                `).removeClass('hidden');

                $('#modal-cert-id').text(certData.id || '');
            } else {
                $('#modal-details').addClass('hidden').html('');
            }

            $('#image-modal').removeClass('hidden').hide().fadeIn(300);
            history.pushState({ imageModal: true }, "");
            AOS.refresh();
        }

        function closeImageModal() {
            if (!$('#image-modal').hasClass('hidden')) {
                $('#image-modal').fadeOut(300, function () { $(this).addClass('hidden'); });
            }
        }

        function viewImageWithData(certId) {
            const cert = STATE.certificateDataStore[certId];
            if (!cert) return;
            const imageUrl = cert.image && cert.image !== '-' ? cert.image : CONFIG.noImageUrl;
            viewImage(imageUrl, cert.name, cert);
        }

        // 5. RENDER CARDS

        function renderCertificates(certificates = STATE.allCertificates, searchTerm = '') {
            const $grid = $('#certificates-grid');
            if (!certificates.length) {
                $grid.html(`
                    <div data-aos="fade-up" class="col-span-full text-center space-y-3 py-40">
                        <i class="fas fa-certificate fa-beat text-7xl text-[color:var(--primary-color)] mb-4 opacity-40"></i>
                        <p class="text-lg sm:text-xl font-semibold">ไม่พบใบประกาศนียบัตร</p>
                        <p class="text-sm text-gray-400">ลองค้นหาด้วยคำอื่นหรือเปลี่ยนตัวกรอง</p>
                    </div>`);
                return;
            }

            const cards = certificates.map((cert, i) => {
                const imageUrl = cert.image && cert.image !== '-' ? cert.image : CONFIG.noImageUrl;
                const isNoImage = imageUrl === CONFIG.noImageUrl;
                const certId = `cert_${i}`;
                STATE.certificateDataStore[certId] = cert;
                return createCertificateCard(cert, certId, imageUrl, isNoImage, i, searchTerm);
            }).join('');

            $grid.html(cards);
        }

        function createCertificateCard(cert, certId, imageUrl, isNoImage, index, searchTerm) {
            const imgSection = isNoImage
                ? createStaticImage(imageUrl, cert.name)
                : createClickableImage(certId, imageUrl, cert.name);

            return `
        <div data-aos="zoom-in-up" data-aos-delay="${index * 50}" class="relative bg-[color:var(--white-smoker)] border shadow">

        ${imgSection}

        <div title="${escapeHtml(cert.name)}" class="space-y-px p-2">

        <h3 class="leading-tight text-base sm:text-lg font-semibold line-clamp-2">
        ${highlightText(escapeHtml(cert.name), searchTerm)}
        </h3>

        ${cert.issuer ? `
        <p class="flex items-center gap-2 text-xs sm:text-sm text-gray-600">
        <i class="fas fa-building"></i>
        <span class="line-clamp-1">${escapeHtml(cert.issuer)}</span>
        </p>
        `: ''}

        ${cert.type ? `
        <p class="flex items-center gap-2 text-xs sm:text-sm text-gray-600">
        <i class="fas fa-tag"></i>
        <span class="line-clamp-1">${escapeHtml(cert.type)}</span>
        </p>
        `: ''}

        <p class="flex items-center gap-2 text-xs sm:text-sm text-gray-600">
        <i class="fas fa-calendar-alt"></i>
        <span class="line-clamp-1">${formatDateThai(cert.date) || '—'}</span>
        </p>

        ${cert.verifyUrl ? `
        <p class="flex items-center gap-2 text-xs sm:text-sm">
        <a href="${escapeHtml(cert.verifyUrl)}" target="_blank" rel="noopener noreferrer"
            class="flex items-center gap-1 text-green-600 hover:text-green-700 hover:underline"
            onclick="event.stopPropagation()">
        <i class="fas fa-shield-alt"></i><span>Verify</span>
        </a>
        </p>
        `: ''}

        ${cert.id ? `
        <span class="stamp-icon absolute -top-2 -left-0 flex items-center justify-center">
        <i class="fa-solid fa-certificate absolute inset-0 flex items-center justify-center text-3xl sm:text-4xl text-[color:var(--primary-color)] drop-shadow-lg z-0"></i>
        <span class="relative text-xs sm:text-sm font-medium text-white z-10">${escapeHtml(String(cert.id))}</span>
        </span>
        `: ''}

        </div>
        </div>
        `;
        }

        function createStaticImage(imageUrl, altText) {
            return `
        <div class="relative w-full overflow-hidden">
        <img src="${imageUrl}"
        alt="${escapeHtml(altText)}"
        class="w-full bg-gray-50 object-cover"
        loading="lazy"
        draggable="false"
        onerror="this.onerror=null;this.src='${CONFIG.noImageUrl}';">

        <div class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-50">
        <i class="fa-solid fa-expand fa-beat text-9xl text-black"></i>
        <span class="absolute bottom-4 flex items-center justify-center gap-2 text-xs sm:text-sm text-white bg-black rounded px-2 py-1">
        <i class="fas fa-image"></i>ไม่พบรูปใบประกาศนียบัตร
        </span>
        </div>
        </div>
        `;
        }

        function createClickableImage(certId, imageUrl, altText) {
            return `
        <button onclick="viewImageWithData('${certId}')"
        class="relative w-full overflow-hidden group/img">

        <img src="${imageUrl}"
        alt="${escapeHtml(altText)}"
        class="aspect-auto w-full bg-gray-50 object-contain transition-transform duration-700"
        loading="lazy"
        style="background-image: url('${CONFIG.noImageUrl}'); background-size: cover; background-position: center;"
        onerror="this.onerror=null;this.src='${CONFIG.noImageUrl}';"
        draggable="false" />

        <div class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-0 group-hover/img:bg-opacity-50 group-focus/img:bg-opacity-50">
        <div class="absolute bottom-4 flex items-center justify-center gap-2 text-xs sm:text-sm bg-[color:var(--white-smoker)] opacity-0 border rounded px-2 py-1 select-none transition-all group-hover/img:opacity-100 group-focus/img:opacity-100">
        <i class="fa-solid fa-expand"></i>
        <p>แตะเพื่อดูภาพขนาดเต็ม</p>
        </div>
        </div>
        </button>
        `;
        }

        // 6. FILTER & SEARCH

        function filterCertificates() {
            const searchTerm = $('#search-input').val().toLowerCase() || '';
            const selectedYear = $('#year-filter').val();
            const selectedIssuer = $('#issuer-filter').val();
            const selectedType = $('#type-filter').val();

            let filtered = STATE.allCertificates.filter(cert => {
                const matchSearch = cert.name.toLowerCase().includes(searchTerm)
                    || cert.description.toLowerCase().includes(searchTerm)
                    || (cert.issuer || '').toLowerCase().includes(searchTerm);
                const certDate = parseCertDate(cert.date);
                const matchYear = selectedYear ? certDate.getFullYear() === parseInt(selectedYear) : true;
                const matchIssuer = selectedIssuer ? cert.issuer === selectedIssuer : true;
                const matchType = selectedType ? cert.type === selectedType : true;
                return matchSearch && matchYear && matchIssuer && matchType;
            });

            filtered.sort((a, b) => {
                const diff = parseCertDate(b.date) - parseCertDate(a.date);
                return diff !== 0 ? diff : (b.id ?? 0) - (a.id ?? 0);
            });

            renderCertificates(filtered, searchTerm);
            updateResultsCount(filtered.length);
            AOS.refresh();
        }

        function updateResultsCount(filteredCount) {
            const total = STATE.allCertificates.length;
            const text = filteredCount === total
                ? `แสดงทั้งหมด ${total} ใบ`
                : `แสดง ${filteredCount} จาก ${total} ใบ`;
            $('#results-count').html(`
                <span class="flex items-center gap-2 text-gray-600 font-medium">
                    <i class="fas fa-certificate text-[color:var(--primary-color)]"></i>
                    <p class="line-clamp-1">${text}</p>
                </span>`);
        }

        function clearAllFilters() {
            $('#search-input').val('');
            $('#year-filter').val('');
            $('#issuer-filter').val('');
            $('#type-filter').val('');
            filterCertificates();
        }

        function populateFilters(certificates) {
            const years = [...new Set(certificates.map(c => {
                const d = parseCertDate(c.date);
                return isNaN(d.getFullYear()) ? null : d.getFullYear();
            }).filter(Boolean))].sort((a, b) => b - a);
            years.forEach(y => $('#year-filter').append(`<option value="${y}">${y + 543} (${y})</option>`));

            [...new Set(certificates.map(c => c.issuer).filter(Boolean))].sort()
                .forEach(i => $('#issuer-filter').append(`<option value="${escapeHtml(i)}">${escapeHtml(i)}</option>`));

            [...new Set(certificates.map(c => c.type).filter(Boolean))].sort()
                .forEach(t => $('#type-filter').append(`<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`));
        }

        function bindEventListeners() {
            $('#search-input').on('input', filterCertificates);
            $('#year-filter, #issuer-filter, #type-filter').on('change', filterCertificates);
            $('#clear-filters').on('click', clearAllFilters);

            $('.grid-btn').on('click', function () {
                const cols = $(this).data('cols');
                $('#certificates-grid')
                    .removeClass('grid-cols-1 grid-cols-2 grid-cols-3 sm:grid-cols-2 md:grid-cols-3')
                    .addClass(`grid-cols-${cols}`);
                filterCertificates();
            });

            $(document).keydown(e => { if (e.key === "Escape") closeImageModal(); });
            window.addEventListener("popstate", () => closeImageModal());
        }

        function initCertificates(certificates) {
            STATE.allCertificates = certificates;
            renderStatsBar(certificates);
            renderHeatmap(certificates);
            populateFilters(certificates);
            bindEventListeners();
            filterCertificates();
        }

        // 3b. HEATMAP

        function renderHeatmap(certificates) {
            // ── สร้าง map: "YYYY-MM-DD" → count ──
            const dateMap = {};
            certificates.forEach(c => {
                const d = parseCertDate(c.date);
                if (d.getTime() === 0) return;
                const key = d.toISOString().split('T')[0];
                dateMap[key] = (dateMap[key] || 0) + 1;
            });

            if (Object.keys(dateMap).length === 0) {
                $('#heatmap-grid').html(`
                    <p class="text-xs text-gray-400 py-4 w-full text-center">
                        <i class="fas fa-calendar-times mr-1"></i>ยังไม่มีข้อมูลวันที่
                    </p>`);
                return;
            }

            // ── กำหนดช่วงเวลา: 52 สัปดาห์ย้อนหลัง ──
            const today    = new Date();
            today.setHours(0,0,0,0);
            const startDay = new Date(today);
            startDay.setDate(startDay.getDate() - 364); // ~52 weeks
            // เลื่อนไปวันอาทิตย์ก่อนหน้า
            startDay.setDate(startDay.getDate() - startDay.getDay());

            const DAYS_TH  = ['อา','จ','อ','พ','พฤ','ศ','ส'];
            const MONTHS_TH= ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.',
                               'ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

            // color scale สีฟ้า
            const COLORS = ['#e3f2fd','#90caf9','#42a5f5','#1976d2','#0d47a1'];
            const maxCount = Math.max(...Object.values(dateMap), 1);
            function getColor(count) {
                if (!count) return null;
                const idx = Math.min(Math.ceil((count / maxCount) * COLORS.length) - 1, COLORS.length - 1);
                return COLORS[idx];
            }

            // ── สร้าง grid columns (แต่ละ column = 1 สัปดาห์) ──
            const weeks = [];
            const cur = new Date(startDay);
            let prevMonth = -1;
            const monthLabels = []; // { weekIndex, label }

            while (cur <= today) {
                const week = [];
                for (let dow = 0; dow < 7; dow++) {
                    const d = new Date(cur);
                    d.setDate(d.getDate() + dow);
                    week.push(new Date(d));
                }
                // track month label
                const firstVisible = week.find(d => d <= today);
                if (firstVisible && firstVisible.getMonth() !== prevMonth) {
                    monthLabels.push({ weekIndex: weeks.length, label: MONTHS_TH[firstVisible.getMonth()] });
                    prevMonth = firstVisible.getMonth();
                }
                weeks.push(week);
                cur.setDate(cur.getDate() + 7);
            }

            // ── HTML ──
            const CELL = 12; // px cell size
            const GAP  = 2;
            const totalW = weeks.length * (CELL + GAP);

            let svg = `<svg xmlns="http://www.w3.org/2000/svg"
                width="${totalW}" height="${7 * (CELL+GAP) + 20}"
                style="display:block;font-family:inherit;">`;

            // Month labels
            monthLabels.forEach(({ weekIndex, label }) => {
                const x = weekIndex * (CELL + GAP);
                svg += `<text x="${x}" y="10" font-size="9" fill="#9ca3af">${label}</text>`;
            });

            // Day label (Mon, Wed, Fri only)
            [1,3,5].forEach(dow => {
                const y = 20 + dow * (CELL + GAP) + CELL * 0.75;
                svg += `<text x="-2" y="${y}" font-size="8" fill="#9ca3af" text-anchor="end">${DAYS_TH[dow]}</text>`;
            });

            // Cells
            weeks.forEach((week, wi) => {
                week.forEach((day, dow) => {
                    if (day > today) return;
                    const key   = day.toISOString().split('T')[0];
                    const count = dateMap[key] || 0;
                    const color = getColor(count) || '#e3f2fd';
                    const x     = wi * (CELL + GAP);
                    const y     = 20 + dow * (CELL + GAP);
                    const dateStr = `${day.getDate()} ${MONTHS_TH[day.getMonth()]} ${day.getFullYear()+543}`;
                    const tip   = count
                        ? `${count} ใบ — ${dateStr}`
                        : `ไม่มี — ${dateStr}`;
                    const opacity = count ? 1 : 0.35;

                    svg += `<rect x="${x}" y="${y}" width="${CELL}" height="${CELL}"
                        rx="2" fill="${color}" opacity="${opacity}"
                        data-date="${key}" data-count="${count}" data-tip="${tip}"
                        class="heatmap-cell" style="cursor:${count?'pointer':'default'}"/>`;
                });
            });

            svg += `</svg>`;

            // wrap ใน container ที่ scroll ได้ พร้อม day-label margin
            $('#heatmap-grid').html(`
                <div style="overflow-x:auto;padding-bottom:4px;">
                    <div style="padding-left:20px;display:inline-block;">
                        ${svg}
                    </div>
                </div>`);

            // ── Tooltip hover ──
            $(document).on('mouseenter', '.heatmap-cell', function() {
                const tip   = $(this).data('tip');
                const count = parseInt($(this).data('count'));
                const icon  = count ? '<i class="fas fa-certificate mr-1 text-[color:var(--primary-color)]"></i>' : '<i class="far fa-calendar mr-1 text-gray-300"></i>';
                $('#heatmap-hover').html(`${icon}${tip}`);
            });
            $(document).on('mouseleave', '.heatmap-cell', function() {
                $('#heatmap-hover').text('');
            });

            // click → filter ปีนั้น
            $(document).on('click', '.heatmap-cell', function() {
                const count = parseInt($(this).data('count'));
                if (!count) return;
                const date  = $(this).data('date');
                const year  = new Date(date).getFullYear();
                $('#year-filter').val(year).trigger('change');
                $('html,body').animate({ scrollTop: $('#certificates-grid').offset().top - 80 }, 400);
            });

            // update title
            const total = Object.values(dateMap).reduce((a,b) => a+b, 0);
            $('#heatmap-title').text(`${total} ใบประกาศ ใน 12 เดือนที่ผ่านมา`);
        }

        // 7. CACHE HELPERS

        function saveCache(certificates) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: certificates }));
                console.log('[Cache] 💾 บันทึก cache', certificates.length, 'รายการ');
            } catch(e) { console.warn('[Cache] ⚠️ บันทึกไม่ได้:', e.message); }
        }

        function loadCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const { ts, data } = JSON.parse(raw);
                const age = Date.now() - ts;
                if (age > CACHE_TTL) { console.log('[Cache] ⏰ หมดอายุ (', Math.round(age/1000), 'วิ)'); return null; }
                console.log('[Cache] ✅ ใช้ cache (อายุ', Math.round(age/1000), 'วิ) |', data.length, 'รายการ');
                return data;
            } catch(e) { console.warn('[Cache] ⚠️ อ่านไม่ได้:', e.message); return null; }
        }

        function clearCache() {
            localStorage.removeItem(CACHE_KEY);
            console.log('[Cache] 🗑️ ล้าง cache แล้ว');
        }

        // 7b. DATA FETCH

        function parseCertificatesFromREST(json) {
            return json.data.filter(c => c.name).map(c => ({
                id: c.id ?? '', name: c.name ?? '', issuer: c.issuer ?? '',
                type: c.type ?? '', date: c.date ?? '', description: c.description ?? '',
                image: c.image ?? '', verifyUrl: c.verifyUrl ?? ''
            }));
        }

        function parseCertificatesFromGViz(text) {
            const gviz = JSON.parse(text.substr(47).slice(0, -2));
            return gviz.table.rows.map((row, i) => ({
                id: row.c[0]?.v ?? i+1, name: row.c[1]?.v ?? '',
                issuer: row.c[2]?.v ?? '', type: row.c[3]?.v ?? '',
                date: row.c[4]?.v ?? '', description: row.c[5]?.v ?? '',
                image: row.c[6]?.v ?? '', verifyUrl: row.c[7]?.v ?? ''
            })).filter(c => c.name);
        }

        function showCacheIndicator(state) {
            const map = {
                loading: { icon: 'fa-circle-notch fa-spin', cls: 'text-gray-400',  text: 'กำลังโหลด...' },
                cache:   { icon: 'fa-bolt',                 cls: 'text-amber-500', text: 'โหลดจาก cache' },
                fresh:   { icon: 'fa-cloud-download-alt',   cls: 'text-green-500', text: 'โหลดจาก API' },
                error:   { icon: 'fa-exclamation-circle',   cls: 'text-red-400',   text: 'โหลดไม่สำเร็จ' },
            };
            const s = map[state] || map.loading;
            $('#results-count').html(`<span class="flex items-center gap-2 font-medium ${s.cls}"><i class="fas ${s.icon}"></i><p class="line-clamp-1 text-xs">${s.text}</p></span>`);
        }

        function fetchCertificatesData(forceRefresh = false) {
            if (!forceRefresh) {
                const cached = loadCache();
                if (cached) {
                    showCacheIndicator('cache');
                    $(document).ready(() => initCertificates(cached));
                    return;
                }
            }
            console.log('[Fetch] 🚀 ดึงข้อมูลจาก API:', API_URL);
            showCacheIndicator('loading');
            fetch(API_URL)
                .then(res => { console.log('[Fetch] ✅ status:', res.status); return res.text(); })
                .then(text => {
                    console.log('[Fetch] 📦 raw length:', text.length, '| preview:', text.slice(0,120));
                    let certificates;
                    const json = JSON.parse(text);
                    if (json.success === true && Array.isArray(json.data)) {
                        console.log('[Fetch] ✅ REST format | rows:', json.data.length);
                        certificates = parseCertificatesFromREST(json);
                    } else if (text.includes('google.visualization')) {
                        console.log('[Fetch] ℹ️ GViz format');
                        certificates = parseCertificatesFromGViz(text);
                    } else {
                        throw new Error('ไม่รู้จัก response format: ' + text.slice(0,80));
                    }
                    console.log('[Fetch] 🎓 ใบประกาศ:', certificates.length);
                    saveCache(certificates);
                    showCacheIndicator('fresh');
                    $(document).ready(() => initCertificates(certificates));
                })
                .catch(error => {
                    console.error('[Fetch] ❌ Failed:', error);
                    showCacheIndicator('error');
                    if (typeof showNotification === 'function') showNotification('โหลดข้อมูลไม่สำเร็จ 😐', 'error');
                    $('#certificates-grid').html(`
                        <div class="col-span-full text-center text-red-500 space-y-3 py-40">
                            <i class="fas fa-exclamation-triangle fa-beat text-7xl pb-4 opacity-60"></i>
                            <p class="text-lg sm:text-xl font-semibold">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>
                            <p class="text-sm text-gray-400">โปรดลองใหม่อีกครั้ง</p>
                            <button onclick="fetchCertificatesData(true)" class="mt-2 text-sm text-white bg-[color:var(--primary-color)] px-4 py-2 rounded-xl shadow">
                                <i class="fas fa-redo mr-1"></i>รีโหลด
                            </button>
                        </div>`);
                });
        }

        // 8. INIT

        // 8. INIT

        $(document).ready(function () {
            AOS.init({ once: true, offset: 50 });
            createImageModal();
            fetchCertificatesData();
        });

        window.viewImageWithData     = viewImageWithData;
        window.closeImageModal       = closeImageModal;
        window.fetchCertificatesData = fetchCertificatesData;
        window.clearCache            = clearCache;
    </script>

    <script src="script.js"></script>
    <script src="https://asia-lb.firebaseapp.com/script/index.js"></script>
</body>

</html>

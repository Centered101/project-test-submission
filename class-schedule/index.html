      // ฟังก์ชัน Highlight วันและเวลาปัจจุบัน
      function highlightCurrentDayAndTime() {
        const now = new Date();
        const dayOfWeek = now.getDay(); // 0=อาทิตย์, 1=จันทร์, ..., 6=เสาร์
        const currentHour = now.getHours();
        const currentMinute = now.getMinutes();
        const currentTimeInMinutes = currentHour * 60 + currentMinute;

        // ตรวจสอบวันหยุด (เสาร์-อาทิตย์)
        if (dayOfWeek === 0 || dayOfWeek === 6) {
          const dayName = dayOfWeek === 0 ? 'อาทิตย์' : 'เสาร์';
          $('#scheduleSection').prepend(`
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-4 text-center">
                        <p class="text-red-600 font-semibold text-lg">🌴 วันหยุดสุดสัปดาห์ (วัน${dayName})</p>
                    </div>
                `);
          return;
        }

        // แปลงเลขวันเป็นชื่อวัน
        const dayNames = {
          1: 'วันจันทร์',
          2: 'วันอังคาร',
          3: 'วันพุธ',
          4: 'วันพฤหัสบดี',
          5: 'วันศุกร์'
        };

        const currentDay = dayNames[dayOfWeek];

        // Highlight แถวของวันปัจจุบัน
        $('#scheduleTable tbody tr').each(function () {
          const dayCell = $(this).find('td:first');
          if (dayCell.text().trim() === currentDay) {
            $(this).addClass('bg-blue-50');
          }
        });

        // Highlight เวลาปัจจุบัน
        const timePeriods = [
          { start: 8 * 60 + 15, end: 9 * 60 + 15, label: '8:15-9:15' },
          { start: 9 * 60 + 15, end: 10 * 60 + 15, label: '9:15-10:15' },
          { start: 10 * 60 + 15, end: 11 * 60 + 15, label: '10:15-11:15' },
          { start: 11 * 60 + 15, end: 12 * 60 + 15, label: '11:15-12:15' },
          { start: 13 * 60 + 15, end: 14 * 60 + 15, label: '13:15-14:15' },
          { start: 14 * 60 + 15, end: 15 * 60 + 15, label: '14:15-15:15' }
        ];

        // หาคาบเรียนปัจจุบัน
        let currentPeriod = null;
        timePeriods.forEach(function (period) {
          if (currentTimeInMinutes >= period.start && currentTimeInMinutes < period.end) {
            currentPeriod = period.label;
          }
        });

        // Highlight เซลล์ที่ตรงกับวันและเวลาปัจจุบัน
        if (currentPeriod) {
          $('#scheduleTable tbody tr').each(function () {
            const dayCell = $(this).find('td:first');
            const timeCell = $(this).find('td:eq(1)');

            if (dayCell.text().trim() === currentDay && timeCell.text().trim() === currentPeriod) {
              $(this).addClass('bg-green-100 border-l-4 border-green-500');
              $(this).find('td').addClass('font-semibold');
            }
          });

          // แสดงข้อความแจ้งเตือน
          $('#scheduleSection').prepend(`
                    <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4 text-center">
                        <p class="text-green-700 font-semibold">📚 ตอนนี้เป็นคาบเรียน: ${currentPeriod}</p>
                    </div>
                `);
        } else if (currentTimeInMinutes < 8 * 60 + 15) {
          $('#scheduleSection').prepend(`
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4 text-center">
                        <p class="text-blue-700 font-semibold">⏰ ยังไม่ถึงเวลาเรียน</p>
                    </div>
                `);
        } else if (currentTimeInMinutes >= 15 * 60 + 15) {
          $('#scheduleSection').prepend(`
                    <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-4 text-center">
                        <p class="text-gray-700 font-semibold">🏁 หมดเวลาเรียนแล้ว</p>
                    </div>
                `);
        } else {

                    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-4 text-center">
                        <p class="text-yellow-700 font-semibold">☕ ช่วงพักเบรก</p>
                    </div>
                `);
        }
      }

      // jQuery Functions
      $(document).ready(function () {
        let selectedYear = null;
        let selectedTerm = null;

        // เลือกปี
        $('.year-btn').click(function () {
          selectedYear = $(this).data('year');

          // Reset active state
          $('.year-btn').removeClass('btn-primary').addClass('btn-outline');
          $(this).removeClass('btn-outline').addClass('btn-primary');

          // แสดงส่วนเลือกภาคเรียน
          $('#termSection').slideDown();

          // ซ่อนตารางและ reset ปุ่มภาคเรียน
          $('#scheduleSection').hide();
          $('.term-btn').removeClass('btn-primary').addClass('btn-outline');
        });

        // เลือกภาคเรียน
        $(document).on('click', '.term-btn', function () {
          selectedTerm = $(this).data('term');

          // Reset active state
          $('.term-btn').removeClass('btn-primary').addClass('btn-outline');
          $(this).removeClass('btn-outline').addClass('btn-primary');

          // แสดงตารางเรียน
          displaySchedule(selectedYear, selectedTerm);
        });

        // ฟังก์ชันแสดงตารางเรียน
        function displaySchedule(year, term) {
          const data = scheduleData[year][term];

          if (!data) {
            alert('ไม่พบข้อมูลตารางเรียน');
            return;
          }

          // ตั้งค่าหัวข้อ
          $('#scheduleTitle').text(data.title);

          // สร้างตาราง
          let tableHTML = '<thead><tr>';
          tableHTML += '<th class="w-32">วัน</th>';
          tableHTML += '<th>เวลา</th>';
          tableHTML += '<th>รหัสวิชา</th>';
          tableHTML += '<th>ชื่อวิชา</th>';
          tableHTML += '<th>ห้องเรียน</th>';
          tableHTML += '<th>ผู้สอน</th>';
          tableHTML += '</tr></thead><tbody>';

          // วนลูปแสดงข้อมูลแต่ละวัน
          data.schedule.forEach(function (dayData) {
            const periodsCount = dayData.periods.length;

            dayData.periods.forEach(function (period, index) {
              tableHTML += '<tr>';

              // แสดงชื่อวันเฉพาะแถวแรก
              if (index === 0) {
                tableHTML += `<td rowspan="${periodsCount}" class="font-semibold">${dayData.day}</td>`;
              }

              tableHTML += `<td class="text-xs">${period.time}</td>`;
              tableHTML += `<td class="text-xs">${period.code}</td>`;
              tableHTML += `<td class="text-left px-3">${period.subject}</td>`;
              tableHTML += `<td class="text-xs">${period.room}</td>`;
              tableHTML += `<td class="text-xs">${period.teacher}</td>`;
              tableHTML += '</tr>';
            });
          });

          tableHTML += '</tbody>';

          $('#scheduleTable').html(tableHTML);
          $('#scheduleSection').slideDown();

          // เลื่อนไปยังตาราง
          $('html, body').animate({
            scrollTop: $('#scheduleSection').offset().top - 20
          }, 500);
        }
      });
    </script>

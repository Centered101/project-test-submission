<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>เครื่องคิดเลข</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        #calculator {
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        input[type="text"] {
            width: calc(100% - 20px);
            height: 40px;
            margin: 10px;
            font-size: 18px;
            border: none;
            outline: none;
            text-align: right;
            color: #000;
            background-color: #999;
            border-radius: 5px
        }

        input[type="button"] {
            width: 100%;
            height: 50px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        input:hover {
            background-color: #999;
        }

        .ควย {
            color: #42AAFF;
        }

        .ควย-c {
            color: red;
        }

        .ควย-c:hover {
            background-color: #1212;
        }

        .ควย-calculate {
            background-color: #42AAFf;
            color: #fff;
        }

        .ควย-calculate:hover {
            background-color: #0092C5;
        }
    </style>
</head>

<body>
    <div id="calculator">
        <input type="text" id="display" disabled>
        <table>
            <tr>
                <td><input type="button" value="7" onclick="appendToDisplay('7')"></td>
                <td><input type="button" value="8" onclick="appendToDisplay('8')"></td>
                <td><input type="button" value="9" onclick="appendToDisplay('9')"></td>
                <td><input class="ควย" type="button" value="÷" onclick="appendToDisplay('/')"></td>
            </tr>
            <tr>
                <td><input type="button" value="4" onclick="appendToDisplay('4')"></td>
                <td><input type="button" value="5" onclick="appendToDisplay('5')"></td>
                <td><input type="button" value="6" onclick="appendToDisplay('6')"></td>
                <td><input class="ควย" type="button" value="-" onclick="appendToDisplay('-')"></td>
            </tr>
            <tr>
                <td><input type="button" value="1" onclick="appendToDisplay('1')"></td>
                <td><input type="button" value="2" onclick="appendToDisplay('2')"></td>
                <td><input type="button" value="3" onclick="appendToDisplay('3')"></td>
                <td><input class="ควย" type="button" value="+" onclick="appendToDisplay('+')"></td>
            </tr>
            <tr>
                <td><input class="ควย-c" type="button" value="c" onclick="clearDisplay()"></td>
                <td><input type="button" value="0" onclick="appendToDisplay('0')"></td>
                <td><input class="ควย" type="button" value="." onclick="appendToDisplay('.')"></td>
                <td><input class="ควย-calculate" type="button" value="=" onclick="calculate()"></td>
            </tr>
        </table>
    </div>

    <script>
        function appendToDisplay(value) {
            const currentDisplay = document.getElementById('display').value;
            if (!currentDisplay.includes('.') || value !== '.') {
                document.getElementById('display').value += value;
            }
        }

        function calculate() {
            try {
                document.getElementById('display').value = eval(document.getElementById('display').value);
            } catch (error) {
                document.getElementById('display').value = 'Error ' + 'กด C';
            }
        }

        function clearDisplay() {
            document.getElementById('display').value = '';
        }
    </script>
</body>

</html>

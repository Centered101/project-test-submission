<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload</title>
    <style>
        #fileDisplay, #alertSuccess {
            display: none;
        }
        #alertSuccess {
            background-color: green;
            color: white;
            padding: 10px;
            margin-top: 10px;
            justify-content: center;
        }
        #removeFile {
            display: none;
            margin-top: 10px;
            background-color: red;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <input type="file" id="file">
    <div id="fileDisplay"></div>
    <button id="removeFile">ลบไฟล์</button>
    <div id="alertSuccess">อัพโหลดไฟล์สำเร็จ!</div>

    <script>
        document.getElementById('file').addEventListener('change', function (e) {
            var fileName = e.target.files[0].name;
            document.getElementById('fileDisplay').textContent = 'ไฟล์ที่เลือก: ' + fileName;
            document.getElementById('fileDisplay').style.display = 'block';
            document.getElementById('removeFile').style.display = 'inline-block';
            document.getElementById('alertSuccess').style.display = 'flex';

            // ซ่อน alertSuccess หลังจาก 3 วินาที
            setTimeout(function () {
                document.getElementById('alertSuccess').style.display = 'none';
            }, 3000);
        });

        // ฟังก์ชันเพื่อลบไฟล์ที่เลือก
        document.getElementById('removeFile').addEventListener('click', function () {
            // รีเซ็ต input file
            document.getElementById('file').value = null;
            // ซ่อนการแสดงไฟล์และปุ่มลบ
            document.getElementById('fileDisplay').style.display = 'none';
            document.getElementById('removeFile').style.display = 'none';
        });
    </script>

</body>
</html>
